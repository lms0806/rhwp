<!DOCTYPE html>
<!-- saved from url=(0068)https://webhwpctrl-example.cloud.hancom.com/hwpctrl.html?id=hwpctrl1 -->
<html style="height: 100%"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <!--<base href="https://webhwpctrl.cloud.hancom.com/webhwpctrl/" target="_blank">--><base href="." target="_blank">
    
    <title></title>
    <link rel="stylesheet" href="./hcwo_hwpctrl.css">
    <script type="text/javascript" src="./jquery.js.download"></script>
    <script type="text/javascript" src="./util.js.download"></script>
    <script type="text/javascript" src="./hwpCtrlApp.js.download"></script>
    <script type="text/javascript" src="./webhwpctrl.js.download"></script>
    <style>
      body {
        overflow: hidden;
        border: 0px solid black;
        margin: 0;
        padding: 0;
      }

      div {
        margin: 0;
        padding: 0;
        border: 0px solid black;
      }
    </style>
  </head>
  <body width="100%" height="100%" style="
      background-color: lightgray;
      background-size: 100px;
      background-repeat: no-repeat;
      background-position: center;
    ">
    <div id="hwpctrl" style="width: 811px; height: 770px; overflow: hidden;">
      <!-- ADD IFRAME -->
    <iframe id="hwpctrl_frame" src="./hwpctrlmain.html" marginwidth="0" marginheight="0" hspace="0" vspace="0" frameborder="0" scrolling="no" style="width:811px; height:770px;"></iframe></div>

    <script>
      // Set onreisze event
      var resize = function (e) {
        var windowWidth =
          document.body.innerWidth ||
          document.documentElement.clientWidth ||
          document.body.clientWidth;
        var windowHeight =
          document.body.innerHeight ||
          document.documentElement.clientHeight ||
          document.body.clientHeight;
        var hwpctrl_panel = document.getElementById("hwpctrl");
        hwpctrl_panel.style.width = parseInt(windowWidth) + "px";
        hwpctrl_panel.style.height = parseInt(windowHeight) + "px";

        var hwpctrl_frame = document.getElementById("hwpctrl_frame");
        if (hwpctrl_frame != null) {
          hwpctrl_frame.width = parseInt(hwpctrl_panel.style.width);
          hwpctrl_frame.style.width = hwpctrl_panel.style.width;
          hwpctrl_frame.height = parseInt(hwpctrl_panel.style.height);
          hwpctrl_frame.style.height = hwpctrl_panel.style.height;
        }
      };

      window.onresize = resize;
      resize();

      // Initialize WEBHWP
      var HwpCtrl = BuildWebHwpCtrl(
        "hwpctrl",
        "https://webhwpctrl.cloud.hancom.com/webhwpctrl/",
        function () {
          window.parent.postMessage("ok", "*");
        }
      );
    </script>
  

</body></html>
